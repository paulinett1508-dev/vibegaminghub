<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arco e Flecha</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.1/TweenMax.min.js"></script>
  <script src="vendor/MorphSVGPlugin.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #0d1b3e;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    svg {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ---- HUD ---- */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      padding: 14px 16px 0;
      pointer-events: none;
      z-index: 20;
    }
    #score-box {
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 8px 28px 10px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    #score-display {
      font-family: 'Russo One', Impact, sans-serif;
      font-size: clamp(28px, 6vw, 54px);
      color: #FFD700;
      text-shadow: 0 0 24px rgba(255,215,0,0.6);
      line-height: 1;
    }
    #level-display {
      font-family: sans-serif;
      font-size: clamp(10px, 2vw, 15px);
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ---- Win overlay ---- */
    #win-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0,0,0,0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: background 0.4s, opacity 0.3s;
    }
    #win-screen.show {
      opacity: 1;
      background: rgba(0,0,0,0.55);
    }
    #win-title {
      font-family: 'Russo One', Impact, sans-serif;
      font-size: clamp(52px, 13vw, 128px);
      color: #FFD700;
      text-shadow: 0 0 50px rgba(255,215,0,0.9), 0 4px 12px rgba(0,0,0,0.9);
      transform: scale(0);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #win-screen.show #win-title { transform: scale(1); }
    #win-sub {
      font-family: sans-serif;
      font-size: clamp(14px, 3vw, 24px);
      color: rgba(255,255,255,0.65);
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.3s 0.5s;
    }
    #win-screen.show #win-sub { opacity: 1; }

    /* ---- Vidas ---- */
    #lives-display {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 5px;
    }
    .heart {
      font-size: clamp(16px, 3.5vw, 26px);
      color: #ff4757;
      text-shadow: 0 0 10px rgba(255,71,87,0.7);
      transition: color 0.3s, text-shadow 0.3s, transform 0.2s;
      display: inline-block;
    }
    .heart.lost {
      color: rgba(255,71,87,0.18);
      text-shadow: none;
    }

    /* ---- Game Over overlay ---- */
    #gameover-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0,0,0,0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: background 0.4s, opacity 0.3s;
    }
    #gameover-screen.show {
      opacity: 1;
      background: rgba(0,0,0,0.65);
      pointer-events: all;
    }
    #gameover-title {
      font-family: 'Russo One', Impact, sans-serif;
      font-size: clamp(52px, 13vw, 120px);
      color: #ff4757;
      text-shadow: 0 0 40px rgba(255,71,87,0.8), 0 4px 12px rgba(0,0,0,0.9);
      transform: scale(0);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #gameover-screen.show #gameover-title { transform: scale(1); }
    #restart-btn {
      margin-top: 28px;
      background: linear-gradient(180deg, #ff6b7a 0%, #ff4757 100%);
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-family: 'Russo One', Impact, sans-serif;
      font-size: clamp(18px, 4vw, 30px);
      cursor: pointer;
      box-shadow: 0 4px 0 #c0392b, 0 8px 20px rgba(255,71,87,0.5);
      opacity: 0;
      transition: opacity 0.3s 0.5s;
      min-width: 180px;
      min-height: 64px;
      letter-spacing: 0.05em;
    }
    #gameover-screen.show #restart-btn { opacity: 1; }
    #restart-btn:active { transform: translateY(2px); }

    /* ---- Hint ---- */
    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.28);
      font-family: sans-serif;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud">

    <!-- Alvo (animado) -->

      <path fill="#F4531C" d="M915.8,265.8c-14.1,14.1-30.8,14.6-36,4.1c-4.1-8.3,0.5-21.3,9.7-30.5s22.2-13.8,30.5-9.7 C930.4,235,929.9,251.7,915.8,265.8z"/>
      <path fill="#FFF" d="M908.9,258.9c-8,8-17.9,9.2-21.6,3.5c-3.2-4.9-0.5-13.4,5.6-19.5c6.1-6.1,14.6-8.8,19.5-5.6 C918.1,241,916.9,250.9,908.9,258.9z"/>
      <path fill="#F4531C" d="M903.2,253.2c-2.9,2.9-6.7,3.6-8.3,1.7c-1.5-1.8-0.6-5.4,2-8c2.6-2.6,6.2-3.6,8-2 C906.8,246.5,906.1,250.2,903.2,253.2z"/>

    <!-- Mensagens originais -->

      <path d="M449 185L453 113 477 112 464 186"/>
      <path d="M486 113L484 130 506 130 481 188 506 187 520 131 540 135 545 119"/>

  <script>
    // =========================================================
    // ÁUDIO
    // =========================================================
    var SomArco = (function () {
      var actx = null, lastTensao = 0;
      function ctx() {
        if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        if (actx && actx.state === 'suspended') actx.resume();
        return actx;
      }
      function tensao(dist) {
        var ac = ctx(); if (!ac) return;
        if (Date.now() - lastTensao < 80) return;
        lastTensao = Date.now();
        var o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(100 + dist * 8, ac.currentTime);
        g.gain.setValueAtTime(0.03, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
        o.start(); o.stop(ac.currentTime + 0.06);
      }
      function disparo() {
        var ac = ctx(); if (!ac) return;
        var buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.15), ac.sampleRate);
        var d = buf.getChannelData(0);
        for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        var s = ac.createBufferSource(), f = ac.createBiquadFilter(), g = ac.createGain();
        s.buffer = buf; f.type = 'bandpass';
        f.frequency.setValueAtTime(2000, ac.currentTime);
        f.frequency.exponentialRampToValueAtTime(400, ac.currentTime + 0.15);
        g.gain.setValueAtTime(0.3, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
        s.connect(f); f.connect(g); g.connect(ac.destination);
        s.start(); s.stop(ac.currentTime + 0.15);
      }
      function acerto() {
        var ac = ctx(); if (!ac) return;
        [880, 1760].forEach(function(hz) {
          var o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination); o.type = 'sine';
          o.frequency.setValueAtTime(hz, ac.currentTime);
          g.gain.setValueAtTime(0.15, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
          o.start(); o.stop(ac.currentTime + 0.4);
        });
      }
      function bullseye() {
        var ac = ctx(); if (!ac) return;
        [523, 659, 784].forEach(function(hz, i) {
          var o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination); o.type = 'sine';
          var t = ac.currentTime + i * 0.12;
          o.frequency.setValueAtTime(hz, t);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.2, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          o.start(t); o.stop(t + 0.25);
        });
      }
      function erro() {
        var ac = ctx(); if (!ac) return;
        var o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination); o.type = 'triangle';
        o.frequency.setValueAtTime(120, ac.currentTime);
        o.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.2);
        g.gain.setValueAtTime(0.25, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
        o.start(); o.stop(ac.currentTime + 0.2);
      }
      function fanfarra() {
        var ac = ctx(); if (!ac) return;
        [523, 659, 784, 1047].forEach(function(hz, i) {
          var o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination); o.type = 'sine';
          var t = ac.currentTime + i * 0.1;
          o.frequency.setValueAtTime(hz, t);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.25, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          o.start(t); o.stop(t + 0.35);
        });
      }
      function gameOver() {
        var ac = ctx(); if (!ac) return;
        [523, 440, 349, 261].forEach(function(hz, i) {
          var o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination); o.type = 'sine';
          var t = ac.currentTime + i * 0.18;
          o.frequency.setValueAtTime(hz, t);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.22, t + 0.03);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
          o.start(t); o.stop(t + 0.45);
        });
      }
      return { tensao:tensao, disparo:disparo, acerto:acerto, bullseye:bullseye, erro:erro, fanfarra:fanfarra, gameOver:gameOver };
    })();

    // =========================================================
    // ESTADO DO JOGO
    // =========================================================
    var svg        = document.querySelector("svg");
    var cursor     = svg.createSVGPoint();
    var arrowsEl   = document.querySelector(".arrows");
    var randomAngle = 0;
    var dragStart   = null;

    // Posições base (coordenadas SVG originais)
    var BASE_TARGET   = { x: 900, y: 249.5 };
    var BASE_LINE     = { x1: 875, y1: 280, x2: 925, y2: 220 };
    var pivot         = { x: 100, y: 250 };

    // Posições dinâmicas (atualizadas pelo movimento do alvo)
    var target      = { x: BASE_TARGET.x, y: BASE_TARGET.y };
    var lineSegment = { x1: BASE_LINE.x1, y1: BASE_LINE.y1, x2: BASE_LINE.x2, y2: BASE_LINE.y2 };

    // Pontuação e níveis
    var hits       = 0;
    var misses     = 0;
    var MAX_MISSES = 3;
    var level      = 1;
    var HITS_TO_WIN = 5;
    var levelAnimating = false;

    // Animação do alvo
    var targetProxy = { y: 0 };
    var targetAnim  = null;

    // Speeds por nível (segundos para um ciclo completo)
    var LEVEL_SPEEDS = [3.5, 2.8, 2.2, 1.7, 1.3, 1.0];
    // Amplitude por nível (unidades SVG)
    var LEVEL_AMPS   = [55,  65,  75,  82,  88,  92 ];

    // =========================================================
    // ANIMAÇÃO DO ALVO
    // =========================================================
    function updateTargetTransform() {
      var dy = targetProxy.y;
      TweenMax.set("#target", { y: dy });
      lineSegment.y1 = BASE_LINE.y1 + dy;
      lineSegment.y2 = BASE_LINE.y2 + dy;
      target.y       = BASE_TARGET.y + dy;
    }

    function startTargetAnim() {
      var idx   = Math.min(level - 1, LEVEL_SPEEDS.length - 1);
      var speed = LEVEL_SPEEDS[idx];
      var amp   = LEVEL_AMPS[idx];
      if (targetAnim) targetAnim.kill();
      targetAnim = TweenMax.to(targetProxy, speed, {
        y: -amp,
        repeat: -1,
        yoyo: true,
        ease: Sine.easeInOut,
        onUpdate: updateTargetTransform
      });
    }

    function jumpTargetToRandom() {
      // Para brevemente, pula para posição aleatória, retoma
      if (targetAnim) targetAnim.kill();
      var newY = (Math.random() * 100) - 50;
      targetProxy.y = newY;
      updateTargetTransform();
      // Breve pausa antes de retomar animação
      setTimeout(startTargetAnim, 250);
    }

    // =========================================================
    // LÓGICA DO JOGO (original + arrasto relativo + scoring)
    // =========================================================
    window.addEventListener("mousedown", draw);

    function draw(e) {
      if (levelAnimating) return;
      // Esconde dica na primeira interação
      document.getElementById('hint').classList.add('hidden');

      randomAngle = Math.random() * Math.PI * 0.03 - 0.015;
      TweenMax.to(".arrow-angle use", 0.3, { opacity: 1 });
      dragStart = getMouseSVG(e) || { x: pivot.x + 50, y: pivot.y };
      window.addEventListener("mousemove", aim);
      window.addEventListener("mouseup",   loose);
      aim(e);
    }

    function aim(e) {
      var current = getMouseSVG(e);
      if (!current || !dragStart) return;

      // Coordenadas de pull relativas ao ponto de pressão
      var relX  = current.x - dragStart.x;
      var relY  = current.y - dragStart.y;
      var pullX = Math.min(pivot.x + relX, pivot.x - 7);
      var pullY = pivot.y + relY;

      var dx       = pullX - pivot.x;
      var dy       = pullY - pivot.y;
      var angle    = Math.atan2(dy, dx) + randomAngle;
      var bowAngle = angle - Math.PI;
      var distance = Math.min(Math.sqrt(dx * dx + dy * dy), 50);

      if (distance > 5) SomArco.tensao(distance);

      var scale = Math.min(Math.max(distance / 30, 1), 2);
      TweenMax.to("#bow", 0.3, { scaleX: scale, rotation: bowAngle + "rad", transformOrigin: "right center" });
      TweenMax.to(".arrow-angle", 0.3, { rotation: bowAngle + "rad", svgOrigin: "100 250" });
      TweenMax.to(".arrow-angle use", 0.3, { x: -distance });
      TweenMax.to("#bow polyline", 0.3, {
        attr: { points: "88,200 " + Math.min(pivot.x - (1 / scale) * distance, 88) + ",250 88,300" }
      });
      var radius   = distance * 9;
      var offset   = { x: Math.cos(bowAngle) * radius, y: Math.sin(bowAngle) * radius };
      var arcWidth = offset.x * 3;
      TweenMax.to("#arc", 0.3, {
        attr: { d: "M100,250c" + offset.x + "," + offset.y + "," + (arcWidth - offset.x) + "," + (offset.y + 50) + "," + arcWidth + ",50" },
        autoAlpha: distance / 60
      });
    }

    function loose() {
      window.removeEventListener("mousemove", aim);
      window.removeEventListener("mouseup",   loose);
      SomArco.disparo();

      TweenMax.to("#bow", 0.4, { scaleX: 1, transformOrigin: "right center", ease: Elastic.easeOut });
      TweenMax.to("#bow polyline", 0.4, { attr: { points: "88,200 88,250 88,300" }, ease: Elastic.easeOut });

      var newArrow = document.createElementNS("http://www.w3.org/2000/svg", "use");
      newArrow.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#arrow");
      arrowsEl.appendChild(newArrow);

      var path = MorphSVGPlugin.pathDataToBezier("#arc");
      TweenMax.to([newArrow], 0.5, {
        force3D: true,
        bezier: { type: "cubic", values: path, autoRotate: ["x", "y", "rotation"] },
        onUpdate: hitTest,
        onUpdateParams: ["{self}"],
        onComplete: onMiss,
        ease: Linear.easeNone
      });
      TweenMax.to("#arc", 0.3, { opacity: 0 });
      TweenMax.set(".arrow-angle use", { opacity: 0 });
    }

    function hitTest(tween) {
      var arrow     = tween.target[0];
      var transform = arrow._gsTransform;
      var radians   = (transform.rotation * Math.PI) / 180;
      var arrowSeg  = {
        x1: transform.x,
        y1: transform.y,
        x2: Math.cos(radians) * 60 + transform.x,
        y2: Math.sin(radians) * 60 + transform.y
      };
      var inter = getIntersection(arrowSeg, lineSegment);
      if (inter && inter.segment1 && inter.segment2) {
        tween.kill();
        var dist = Math.sqrt(
          Math.pow(inter.x - target.x, 2) + Math.pow(inter.y - target.y, 2)
        );
        if (dist < 7) {
          SomArco.bullseye();
          showMessage(".loveyou");
        } else {
          SomArco.acerto();
          showMessage(".hit");
        }
        onHit();
      }
    }

    function updateLives() {
      for (var i = 1; i <= MAX_MISSES; i++) {
        var h = document.getElementById('heart-' + i);
        if (h) h.className = 'heart' + (i > MAX_MISSES - misses ? ' lost' : '');
      }
    }

    function onMiss() {
      misses++;
      SomArco.erro();
      showMessage(".missyou");
      updateLives();
      if (misses >= MAX_MISSES) {
        setTimeout(onGameOver, 900);
      }
    }

    function onGameOver() {
      levelAnimating = true;
      SomArco.gameOver();
      if (targetAnim) targetAnim.kill();
      document.getElementById('gameover-screen').classList.add('show');
    }

    function restartLevel() {
      document.getElementById('gameover-screen').classList.remove('show');
      misses = 0;
      hits   = 0;
      updateLives();
      document.getElementById('hits-count').textContent = '0';
      arrowsEl.innerHTML = '';
      targetProxy.y = 0;
      updateTargetTransform();
      setTimeout(function () {
        levelAnimating = false;
        startTargetAnim();
      }, 350);
    }

    function onHit() {
      // Flash no alvo
      TweenMax.fromTo("#target", 0.1,
        { scaleX: 1, scaleY: 1 },
        { scaleX: 1.35, scaleY: 1.35, svgOrigin: "900 250", yoyo: true, repeat: 1, ease: Power2.easeOut }
      );

      hits++;
      document.getElementById('hits-count').textContent = hits;

      if (hits >= HITS_TO_WIN) {
        setTimeout(onLevelComplete, 600);
      } else {
        // Alvo pula para nova posição após acerto
        setTimeout(jumpTargetToRandom, 400);
      }
    }

    // =========================================================
    // VITÓRIA / PRÓXIMO NÍVEL
    // =========================================================
    function onLevelComplete() {
      levelAnimating = true;
      SomArco.fanfarra();
      launchConfetti();

      var winScreen = document.getElementById('win-screen');
      var winSub    = document.getElementById('win-sub');
      level++;
      winSub.textContent = level <= 6 ? 'Nível ' + level + '...' : 'Incrível!';
      winScreen.classList.add('show');

      setTimeout(function () {
        winScreen.classList.remove('show');
        setTimeout(function () {
          hits   = 0;
          misses = 0;
          updateLives();
          document.getElementById('hits-count').textContent = '0';
          document.getElementById('level-num').textContent  = level;
          // Limpa flechas acumuladas
          arrowsEl.innerHTML = '';
          // Reinicia animação do alvo (mais rápido)
          targetProxy.y = 0;
          updateTargetTransform();
          levelAnimating = false;
          startTargetAnim();
        }, 350);
      }, 2800);
    }

    // =========================================================
    // CONFETTI
    // =========================================================
    function launchConfetti() {
      var cv = document.createElement('canvas');
      cv.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:25;';
      cv.width  = window.innerWidth;
      cv.height = window.innerHeight;
      document.body.appendChild(cv);
      var ctx = cv.getContext('2d');
      var colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#88ce02','#FF9F43'];
      var particles = [];
      for (var i = 0; i < 90; i++) {
        particles.push({
          x:  Math.random() * cv.width,
          y: -10 - Math.random() * 60,
          vx: (Math.random() - 0.5) * 9,
          vy: Math.random() * 5 + 2,
          color: colors[i % colors.length],
          w: Math.random() * 12 + 5,
          h: Math.random() * 6 + 4,
          rot: Math.random() * 360,
          rs: (Math.random() - 0.5) * 12
        });
      }
      function frame() {
        ctx.clearRect(0, 0, cv.width, cv.height);
        var alive = false;
        for (var j = 0; j < particles.length; j++) {
          var p = particles[j];
          if (p.y < cv.height + 20) {
            alive = true;
            p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.rot += p.rs;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          }
        }
        if (alive) requestAnimationFrame(frame);
        else document.body.removeChild(cv);
      }
      requestAnimationFrame(frame);
    }

    // =========================================================
    // HELPERS ORIGINAIS
    // =========================================================
    function showMessage(selector) {
      TweenMax.killTweensOf(selector);
      TweenMax.killChildTweensOf(selector);
      TweenMax.set(selector, { autoAlpha: 1 });
      TweenMax.staggerFromTo(selector + " path", 0.5,
        { rotation: -5, scale: 0, transformOrigin: "center" },
        { scale: 1, ease: Back.easeOut }, 0.05);
      TweenMax.staggerTo(selector + " path", 0.3,
        { delay: 2, rotation: 20, scale: 0, ease: Back.easeIn }, 0.03);
    }

    function getMouseSVG(e) {
      cursor.x = e.clientX; cursor.y = e.clientY;
      var ctm = svg.getScreenCTM();
      if (!ctm) return null;
      return cursor.matrixTransform(ctm.inverse());
    }

    function getIntersection(s1, s2) {
      var dx1 = s1.x2 - s1.x1, dy1 = s1.y2 - s1.y1;
      var dx2 = s2.x2 - s2.x1, dy2 = s2.y2 - s2.y1;
      var cx  = s1.x1 - s2.x1, cy  = s1.y1 - s2.y1;
      var den = dy2 * dx1 - dx2 * dy1;
      if (!den) return null;
      var ua = (dx2 * cy - dy2 * cx) / den;
      var ub = (dx1 * cy - dy1 * cx) / den;
      return { x: s1.x1 + ua * dx1, y: s1.y1 + ua * dy1,
               segment1: ua >= 0 && ua <= 1, segment2: ub >= 0 && ub <= 1 };
    }

    // =========================================================
    // TOUCH → MOUSE
    // =========================================================
    document.body.addEventListener('touchstart', function (e) {
      e.preventDefault();
      var t = e.touches[0];
      window.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    }, { passive: false });

    document.body.addEventListener('touchmove', function (e) {
      e.preventDefault();
      var t = e.touches[0];
      window.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    }, { passive: false });

    document.body.addEventListener('touchend', function (e) {
      e.preventDefault();
      window.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
    }, { passive: false });

    // =========================================================
    // INICIAR
    // =========================================================
    document.getElementById('restart-btn').addEventListener('click', restartLevel);
    startTargetAnim();
  </script>
</body>
</html>
