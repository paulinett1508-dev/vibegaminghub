<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeGaming</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Russo+One&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            /* Cores brutalist (dark mode) */
            --bg-dark: #111111;
            --bg-card: #1a1a1a;
            --bg-surface: #2a2a2a;
            --text-primary: #f0ead8;
            --text-secondary: #b8b0a0;
            --text-muted: #7a7060;
            --accent-primary: #FFD700;
            --accent-purple: #FFD700;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-orange: #fb923c;
            --accent-pink: #f472b6;
            --accent-blue: #38bdf8;
            --border-color: #f0ead8;

            /* Radii brutalist */
            --radius-lg: 6px;
            --radius-md: 4px;
            --radius-sm: 2px;

            /* Tipografia */
            --font-title: 'Space Grotesk', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;

            /* Sombras brutalist — flat, sem blur */
            --shadow-brutal-sm: 3px 3px 0 0 var(--border-color);
            --shadow-brutal: 5px 5px 0 0 var(--border-color);
            --shadow-brutal-lg: 8px 8px 0 0 var(--border-color);

            /* Transicao brutalist */
            --transition-brutal: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        /* ---- Telas ---- */
        .tela {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity, transform;
        }

        .tela.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* ---- SPLASH ---- */
        #tela-splash {
            background: #111111;
            gap: 20px;
            padding: 32px 24px;
            overflow: hidden;
        }

        /* Fundo com personagens */
        .splash-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .splash-bg canvas {
            width: 100%;
            height: 100%;
        }

        /* Hero image */
        .splash-hero {
            position: relative;
            z-index: 2;
            width: 180px;
            height: 180px;
            border: 3px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-brutal-lg);
            background: var(--bg-card);
            overflow: hidden;
        }

        .splash-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Logo estilo da referencia */
        .splash-title {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 8px;
        }

        .splash-title h1 {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-primary);
            line-height: 1.15;
            letter-spacing: 0.02em;
            text-shadow: 3px 3px 0 #000;
        }

        .splash-subtitle {
            position: relative;
            z-index: 2;
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-top: -5px;
            margin-bottom: 20px;
        }

        .btn-jogar {
            position: relative;
            z-index: 2;
            background: var(--accent-primary);
            color: #111;
            border: 3px solid var(--border-color);
            padding: 18px 48px;
            border-radius: var(--radius-md);
            font-family: var(--font-title);
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-brutal);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 64px;
            box-shadow: var(--shadow-brutal);
            letter-spacing: 0.05em;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-jogar:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-brutal-lg);
        }

        .btn-jogar:active {
            transform: translateY(2px);
            box-shadow: var(--shadow-brutal-sm);
        }

        /* ---- LOW-PERF: reduzir animacoes ---- */
        .low-perf .splash-hero {
            animation: slam-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
        }
        .low-perf .tela {
            transition: none !important;
        }
        .low-perf .tela.hidden {
            transition: none !important;
        }

        /* ---- HUB ---- */
        #tela-hub {
            background: var(--bg-dark);
            padding: 0;
            justify-content: flex-start;
        }

        .hub-header {
            width: 100%;
            padding: 20px 24px 16px;
            text-align: center;
            flex-shrink: 0;
            border-bottom: 3px solid var(--border-color);
        }

        .hub-header h2 {
            font-family: var(--font-title);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .hub-header p {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 4px;
        }

        .hub-grid {
            display: flex;
            flex-direction: column;
            padding: 0 16px 32px;
            width: 100%;
            max-width: 440px;
            overflow-y: auto;
            flex: 1;
        }

        .hub-section-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent-primary);
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding: 16px 0 6px;
            margin-bottom: 10px;
        }

        .hub-section-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 4px;
        }

        .hub-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition-brutal);
            min-height: 90px;
            justify-content: center;
            box-shadow: var(--shadow-brutal-sm);
            -webkit-tap-highlight-color: transparent;
        }

        .hub-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-brutal);
        }

        .hub-card:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        .hub-card-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-card-icon .material-icons {
            font-size: 24px;
            color: white;
        }

        .hub-card-name {
            font-family: var(--font-title);
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.2;
        }

        .hub-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-brutal);
            box-shadow: var(--shadow-brutal-sm);
        }

        .hub-back:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            box-shadow: var(--shadow-brutal);
        }

        /* ---- JOGO (container fullscreen) ---- */
        #tela-jogo {
            background: var(--bg-dark);
            padding: 0;
        }

        .jogo-voltar {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10000;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-brutal);
            box-shadow: var(--shadow-brutal-sm);
        }

        .jogo-voltar:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            box-shadow: var(--shadow-brutal);
        }

        #jogo-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 60px 20px 20px;
        }

        /* Animacoes epicas de entrada */
        @keyframes slam-in {
            0% { opacity: 0; transform: scale(2) translateY(-50px); }
            60% { opacity: 1; transform: scale(0.9) translateY(5px); }
            80% { transform: scale(1.05) translateY(-2px); }
            100% { transform: scale(1) translateY(0); }
        }

        @keyframes slide-up {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop-in {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            70% { transform: scale(1.1) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .splash-hero {
            animation: slam-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .splash-title { animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both; }
        .splash-subtitle { animation: slide-up 0.5s ease-out 0.4s both; }
        .btn-jogar { animation: slide-up 0.5s ease-out 0.5s both; }
    </style>
</head>
<body>

    <!-- ========== TELA 1: SPLASH ========== -->
    <div id="tela-splash" class="tela">
        <div class="splash-bg">
            <canvas id="splash-bg-canvas"></canvas>
        </div>

        <div class="splash-hero">
            <img src="assets/img/splash-vibe2.jpg" alt="Retro gaming setup" width="180" height="180">
        </div>

        <div class="splash-title">
            <h1>VibeGaming</h1>
        </div>

        <p class="splash-subtitle">Walk On!</p>

        <button class="btn-jogar" id="btn-jogar" aria-label="Jogar">
            <span class="material-icons" style="font-size:24px;">play_arrow</span>
            Jogar
        </button>
    </div>

    <!-- ========== TELA 2: HUB ========== -->
    <div id="tela-hub" class="tela hidden">
        <button class="hub-back" id="hub-back-btn" aria-label="Voltar">
            <span class="material-icons" style="font-size:22px;">arrow_back</span>
        </button>

        <div class="hub-header">
            <h2>VibeGaming</h2>
            <p>Escolha um jogo</p>
        </div>

        <div class="hub-grid" id="hub-grid">
            <!-- Cards inseridos via JS -->
        </div>
    </div>

    <!-- ========== TELA 3: JOGO ========== -->
    <div id="tela-jogo" class="tela hidden">
        <button class="jogo-voltar" id="jogo-voltar-btn" aria-label="Voltar para jogos">
            <span class="material-icons" style="font-size:22px;">arrow_back</span>
        </button>
        <div id="jogo-container"></div>
    </div>

    <!-- Deteccao de performance (DEVE carregar antes dos jogos) -->
    <script src="jogos/perf-detect.js?v=1"></script>

    <!-- Scripts dos jogos -->
    <script src="jogos/penaltis.js?v=2"></script>
    <script src="jogos/escorpiao.js?v=5"></script>
    <script src="jogos/reptil.js?v=3"></script>
    <script src="jogos/pacman.js?v=6"></script>
    <script src="jogos/tamandua.js?v=1"></script>
    <script src="jogos/aranha.js?v=1"></script>
    <script src="jogos/arco.js?v=1"></script>
    <script src="jogos/sonic.js?v=3"></script>
    <script src="jogos/megadrive.js?v=1"></script>
    <script src="jogos/donkeykong.js?v=3"></script>
    <script src="jogos/snes.js?v=5"></script>
    <script src="jogos/solar-system.js?v=10"></script>
    <script src="jogos/joguinhos-modal.js?v=10"></script>
</body>
</html>
