<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joguinhos do José</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-purple: #818cf8;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-orange: #fb923c;
            --accent-pink: #f472b6;
            --accent-blue: #38bdf8;
            --radius-lg: 20px;
            --radius-md: 14px;
            --font-title: 'Russo One', sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        /* ---- Telas ---- */
        .tela {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            will-change: opacity, transform;
        }

        .tela.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* ---- SPLASH ---- */
        #tela-splash {
            background: linear-gradient(180deg, #0d1b3e 0%, #112244 40%, #0f172a 100%);
            gap: 20px;
            padding: 32px 24px;
            overflow: hidden;
        }

        /* Fundo com personagens */
        .splash-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .splash-bg canvas {
            width: 100%;
            height: 100%;
        }

        /* Mascote Jose - rosto grande */
        .splash-jose {
            position: relative;
            z-index: 2;
            width: 180px;
            height: 180px;
            filter: drop-shadow(0 0 25px rgba(59, 130, 196, 0.4));
        }

        .splash-jose canvas {
            width: 100%;
            height: 100%;
        }

        /* Logo estilo da referencia */
        .splash-title {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 8px;
        }

        .splash-title h1 {
            font-family: var(--font-title);
            font-size: 3rem;
            color: #ffffff;
            line-height: 1.15;
            letter-spacing: 0.02em;
            text-shadow:
                3px 3px 0 #7c3aed,
                -1px -1px 0 #7c3aed,
                1px -1px 0 #7c3aed,
                -1px 1px 0 #7c3aed,
                0 4px 0 #5b21b6,
                0 0 30px rgba(139, 92, 246, 0.6);
        }

        @keyframes logo-pulse {
            0%, 100% { text-shadow: 3px 3px 0 #7c3aed, -1px -1px 0 #7c3aed, 1px -1px 0 #7c3aed, -1px 1px 0 #7c3aed, 0 4px 0 #5b21b6, 0 0 30px rgba(139, 92, 246, 0.6); }
            50% { text-shadow: 3px 3px 0 #7c3aed, -1px -1px 0 #7c3aed, 1px -1px 0 #7c3aed, -1px 1px 0 #7c3aed, 0 4px 0 #5b21b6, 0 0 50px rgba(139, 92, 246, 0.9); }
        }

        .splash-title h1 {
            animation: logo-pulse 2s ease-in-out infinite;
        }

        .splash-subtitle {
            position: relative;
            z-index: 2;
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 500;
            font-style: italic;
            letter-spacing: 0.05em;
            margin-top: -5px;
            margin-bottom: 20px;
        }

        .btn-jogar {
            position: relative;
            z-index: 2;
            background: linear-gradient(180deg, #8b5cf6 0%, #7c3aed 50%, #6d28d9 100%);
            color: white;
            border: none;
            padding: 18px 48px;
            border-radius: 50px;
            font-family: var(--font-title);
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 64px;
            box-shadow:
                0 4px 0 #5b21b6,
                0 8px 25px rgba(139, 92, 246, 0.5),
                inset 0 2px 0 rgba(255,255,255,0.2);
            letter-spacing: 0.05em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .btn-jogar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: btn-shine 2.5s infinite;
        }

        @keyframes btn-shine {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .btn-jogar:hover {
            transform: translateY(-3px);
            box-shadow:
                0 7px 0 #5b21b6,
                0 12px 35px rgba(139, 92, 246, 0.6),
                inset 0 2px 0 rgba(255,255,255,0.2);
        }

        .btn-jogar:active {
            transform: translateY(2px);
            box-shadow:
                0 2px 0 #166534,
                0 4px 20px rgba(34, 197, 94, 0.4),
                inset 0 2px 0 rgba(255,255,255,0.2);
        }

        /* ---- LOW-PERF: reduzir animacoes caras ---- */
        .low-perf .splash-jose {
            filter: none !important;
            animation: slam-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
        }
        .low-perf .splash-title h1 {
            animation: none !important;
        }
        .low-perf .btn-jogar::before {
            animation: none !important;
            display: none;
        }
        .low-perf .tela {
            transition: none !important;
        }
        .low-perf .tela.hidden {
            transition: none !important;
        }

        /* ---- HUB ---- */
        #tela-hub {
            background: var(--bg-dark);
            padding: 0;
            justify-content: flex-start;
        }

        .hub-header {
            width: 100%;
            padding: 20px 24px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .hub-header h2 {
            font-family: var(--font-title);
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .hub-header p {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 8px 20px 32px;
            width: 100%;
            max-width: 420px;
            overflow-y: auto;
            flex: 1;
        }

        .hub-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 140px;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .hub-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .hub-card:active {
            transform: scale(0.96);
        }

        .hub-card-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-card-icon .material-icons {
            font-size: 36px;
            color: white;
        }

        .hub-card-name {
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--text-primary);
            text-align: center;
        }

        .hub-card.locked {
            opacity: 0.35;
            cursor: default;
        }

        .hub-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .hub-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--bg-card);
            border: 1px solid var(--bg-surface);
            color: var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .hub-back:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        /* ---- JOGO (container fullscreen) ---- */
        #tela-jogo {
            background: var(--bg-dark);
            padding: 0;
        }

        .jogo-voltar {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10000;
            background: var(--bg-card);
            border: 1px solid var(--bg-surface);
            color: var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .jogo-voltar:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        #jogo-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 60px 20px 20px;
        }

        /* Animacoes epicas de entrada */
        @keyframes slam-in {
            0% { opacity: 0; transform: scale(2) translateY(-50px); }
            60% { opacity: 1; transform: scale(0.9) translateY(5px); }
            80% { transform: scale(1.05) translateY(-2px); }
            100% { transform: scale(1) translateY(0); }
        }

        @keyframes slide-up {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop-in {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            70% { transform: scale(1.1) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes float-rotate {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 25px rgba(59, 130, 196, 0.4)); }
            50% { filter: drop-shadow(0 0 45px rgba(59, 130, 196, 0.7)); }
        }

        .splash-jose {
            animation: slam-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                       float-rotate 4s ease-in-out 0.7s infinite,
                       glow-pulse 3s ease-in-out 0.7s infinite;
        }
        .splash-title { animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both; }
        .splash-subtitle { animation: slide-up 0.5s ease-out 0.4s both; }
        .btn-jogar { animation: slide-up 0.5s ease-out 0.5s both; }
    </style>
</head>
<body>

    <!-- ========== TELA 1: SPLASH ========== -->
    <div id="tela-splash" class="tela">
        <div class="splash-bg">
            <canvas id="splash-bg-canvas"></canvas>
        </div>

        <div class="splash-jose">
            <canvas id="jose-canvas" width="180" height="180"></canvas>
        </div>

        <div class="splash-title">
            <h1>Joguinhos<br>do José</h1>
        </div>

        <p class="splash-subtitle">Diversão para crianças</p>

        <button class="btn-jogar" id="btn-jogar" aria-label="Jogar">
            <span class="material-icons" style="font-size:24px;">play_arrow</span>
            Jogar
        </button>
    </div>

    <!-- ========== TELA 2: HUB ========== -->
    <div id="tela-hub" class="tela hidden">
        <button class="hub-back" id="hub-back-btn" aria-label="Voltar">
            <span class="material-icons" style="font-size:22px;">arrow_back</span>
        </button>

        <div class="hub-header">
            <h2>Joguinhos</h2>
            <p>Escolha um jogo</p>
        </div>

        <div class="hub-grid" id="hub-grid">
            <!-- Cards inseridos via JS -->
        </div>
    </div>

    <!-- ========== TELA 3: JOGO ========== -->
    <div id="tela-jogo" class="tela hidden">
        <button class="jogo-voltar" id="jogo-voltar-btn" aria-label="Voltar para jogos">
            <span class="material-icons" style="font-size:22px;">arrow_back</span>
        </button>
        <div id="jogo-container"></div>
    </div>

    <!-- Deteccao de performance (DEVE carregar antes dos jogos) -->
    <script src="jogos/perf-detect.js?v=1"></script>

    <!-- Scripts dos jogos -->
    <script src="jogos/penaltis.js?v=2"></script>
    <script src="jogos/escorpiao.js?v=5"></script>
    <script src="jogos/reptil.js?v=3"></script>
    <script src="jogos/pacman.js?v=6"></script>
    <script src="jogos/tamandua.js?v=1"></script>
    <script src="jogos/aranha.js?v=1"></script>
    <script src="jogos/arco.js?v=1"></script>
    <script src="jogos/sonic.js?v=1"></script>
    <script src="jogos/megadrive.js?v=1"></script>
    <script src="jogos/atari.js?v=1"></script>
    <script src="jogos/joguinhos-modal.js?v=10"></script>
</body>
</html>
