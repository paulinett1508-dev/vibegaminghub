<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joguinhos do Jose</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-purple: #818cf8;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-orange: #fb923c;
            --accent-pink: #f472b6;
            --accent-blue: #38bdf8;
            --radius-lg: 20px;
            --radius-md: 14px;
            --font-title: 'Russo One', sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        /* ---- Telas ---- */
        .tela {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            will-change: opacity, transform;
        }

        .tela.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* ---- SPLASH ---- */
        #tela-splash {
            background: linear-gradient(180deg, #0f172a 0%, #1a1040 50%, #0f172a 100%);
            gap: 24px;
            padding: 32px 24px;
            overflow: hidden;
        }

        /* Fundo com personagens */
        .splash-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .splash-bg canvas {
            width: 100%;
            height: 100%;
        }

        /* Garotinho animado */
        .splash-jose {
            position: relative;
            z-index: 2;
            width: 120px;
            height: 120px;
        }

        .splash-jose canvas {
            width: 100%;
            height: 100%;
        }

        .splash-title {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .splash-title h1 {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(129,140,248,0.4);
            line-height: 1.2;
        }

        .splash-title h1 span {
            display: block;
            font-size: 2.6rem;
            background: linear-gradient(135deg, var(--accent-amber), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash-subtitle {
            position: relative;
            z-index: 2;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .btn-jogar {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 20px 56px;
            border-radius: var(--radius-md);
            font-family: var(--font-title);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-height: 64px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.35);
            animation: pulse-btn 2s infinite;
        }

        .btn-jogar:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
        }

        .btn-jogar:active {
            transform: translateY(0) scale(0.97);
            animation: none;
        }

        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 8px 32px rgba(99, 102, 241, 0.35); }
            50% { box-shadow: 0 8px 40px rgba(99, 102, 241, 0.55); }
        }

        /* ---- HUB ---- */
        #tela-hub {
            background: var(--bg-dark);
            padding: 0;
            justify-content: flex-start;
        }

        .hub-header {
            width: 100%;
            padding: 20px 24px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .hub-header h2 {
            font-family: var(--font-title);
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .hub-header p {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 8px 20px 32px;
            width: 100%;
            max-width: 420px;
            overflow-y: auto;
            flex: 1;
        }

        .hub-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 140px;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .hub-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .hub-card:active {
            transform: scale(0.96);
        }

        .hub-card-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-card-icon .material-icons {
            font-size: 36px;
            color: white;
        }

        .hub-card-name {
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--text-primary);
            text-align: center;
        }

        .hub-card.locked {
            opacity: 0.35;
            cursor: default;
        }

        .hub-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .hub-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--bg-card);
            border: 1px solid var(--bg-surface);
            color: var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .hub-back:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        /* ---- JOGO (container fullscreen) ---- */
        #tela-jogo {
            background: var(--bg-dark);
            padding: 0;
        }

        .jogo-voltar {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10000;
            background: var(--bg-card);
            border: 1px solid var(--bg-surface);
            color: var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .jogo-voltar:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        #jogo-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 60px 20px 20px;
        }

        /* Bounce animation for splash elements */
        @keyframes bounce-in {
            0% { opacity: 0; transform: scale(0.3); }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .splash-jose { animation: bounce-in 0.6s ease-out, float 3s ease-in-out 0.6s infinite; }
        .splash-title { animation: bounce-in 0.6s ease-out 0.15s both; }
        .splash-subtitle { animation: bounce-in 0.4s ease-out 0.3s both; }
        .btn-jogar { animation: bounce-in 0.5s ease-out 0.45s both, pulse-btn 2s 1s infinite; }
    </style>
</head>
<body>

    <!-- ========== TELA 1: SPLASH ========== -->
    <div id="tela-splash" class="tela">
        <div class="splash-bg">
            <canvas id="splash-bg-canvas"></canvas>
        </div>

        <div class="splash-jose">
            <canvas id="jose-canvas" width="120" height="120"></canvas>
        </div>

        <div class="splash-title">
            <h1>
                Joguinhos do
                <span>Jose</span>
            </h1>
        </div>

        <p class="splash-subtitle">Diversao para criancas</p>

        <button class="btn-jogar" id="btn-jogar" aria-label="Jogar">
            <span class="material-icons" style="font-size:28px;">play_arrow</span>
            Jogar
        </button>
    </div>

    <!-- ========== TELA 2: HUB ========== -->
    <div id="tela-hub" class="tela hidden">
        <button class="hub-back" id="hub-back-btn" aria-label="Voltar">
            <span class="material-icons" style="font-size:22px;">arrow_back</span>
        </button>

        <div class="hub-header">
            <h2>Joguinhos</h2>
            <p>Escolha um jogo</p>
        </div>

        <div class="hub-grid" id="hub-grid">
            <!-- Cards inseridos via JS -->
        </div>
    </div>

    <!-- ========== TELA 3: JOGO ========== -->
    <div id="tela-jogo" class="tela hidden">
        <button class="jogo-voltar" id="jogo-voltar-btn" aria-label="Voltar para jogos">
            <span class="material-icons" style="font-size:22px;">arrow_back</span>
        </button>
        <div id="jogo-container"></div>
    </div>

    <!-- Scripts dos jogos -->
    <script src="jogos/penaltis.js"></script>
    <script src="jogos/escorpiao.js"></script>
    <script src="jogos/joguinhos-modal.js"></script>
</body>
</html>
